# SPDX-License-Identifier: GPL-3.0-or-later
# CI workflow for automated UI tests using dogtail + AT-SPI + Xvfb
name: UI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ui-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    name: Automated UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtksourceview-5-dev \
            libsecret-1-dev \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-gtksource-5 \
            gir1.2-secret-1 \
            gir1.2-atspi-2.0 \
            at-spi2-core \
            dbus-x11 \
            xvfb \
            xauth \
            glib-networking \
            gsettings-desktop-schemas \
            libgirepository1.0-dev \
            python3-gi \
            python3-gi-cairo \
            gobject-introspection \
            libcairo2-dev \
            pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Compile GSettings schemas
        run: |
          mkdir -p data/
          glib-compile-schemas data/ || true

      - name: Start D-Bus session bus
        run: |
          eval $(dbus-launch --sh-syntax)
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> $GITHUB_ENV

      - name: Start AT-SPI registry
        run: |
          /usr/libexec/at-spi2-registryd &
          sleep 1
        env:
          DBUS_SESSION_BUS_ADDRESS: ${{ env.DBUS_SESSION_BUS_ADDRESS }}

      - name: Run UI tests under Xvfb
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" \
            uv run pytest tests/ui/ -v --timeout=60 \
              -x --tb=short \
              -o "log_cli=true" \
              -o "log_cli_level=INFO"
        env:
          COPILOT_GTK_MOCK_BACKEND: "1"
          COPILOT_GTK_MOCK_DELAY: "30"
          GTK_A11Y: "atspi"
          NO_AT_BRIDGE: "0"
          DBUS_SESSION_BUS_ADDRESS: ${{ env.DBUS_SESSION_BUS_ADDRESS }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-screenshots
          path: tests/ui/screenshots/*.png
          if-no-files-found: ignore
          retention-days: 7
