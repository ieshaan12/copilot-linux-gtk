name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository-2.0-dev \
            libcairo2-dev \
            pkg-config

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgirepository-2.0-dev \
            libcairo2-dev \
            pkg-config \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-gtksource-5 \
            gir1.2-secret-1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run mypy
        run: uv run mypy src/copilot_gtk/ --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgirepository-2.0-dev \
            libcairo2-dev \
            pkg-config \
            gir1.2-gtk-4.0 \
            gir1.2-adw-1 \
            gir1.2-gtksource-5 \
            gir1.2-secret-1 \
            glib-networking \
            xvfb

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: xvfb-run --auto-servernum uv run pytest tests/ -v --tb=short --ignore=tests/ui
        env:
          GI_TYPELIB_PATH: /usr/lib/x86_64-linux-gnu/girepository-1.0
          GSETTINGS_BACKEND: memory

  validate-data:
    name: Validate Data Files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install validators
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            desktop-file-utils \
            appstream \
            libglib2.0-dev-bin

      - name: Validate desktop file
        run: desktop-file-validate data/io.github.ieshaan.CopilotGTK.desktop.in || true

      - name: Validate AppStream metadata
        run: appstreamcli validate --no-net data/io.github.ieshaan.CopilotGTK.metainfo.xml.in || true

      - name: Validate GSettings schema
        run: glib-compile-schemas --strict --dry-run data/
